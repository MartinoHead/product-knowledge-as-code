name: bda-quality

on:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13

      - name: Install dependencies
        working-directory: template-project
        run: npm ci

      - name: Lint
        working-directory: template-project
        run: npm run lint

      - name: Typecheck
        working-directory: template-project
        run: npm run typecheck

      - name: Verify knowledge sync (md/yaml/gherkin)
        working-directory: template-project
        run: npm run verify:sync

      - name: Generate tests from knowledge
        working-directory: template-project
        run: npm run generate:tests

      - name: Fail on generated test drift
        run: git diff --exit-code

      - name: Verify rule coverage
        working-directory: template-project
        run: npm run verify:coverage

      - name: Execute API tests
        working-directory: template-project
        run: npm run test:api

      - name: Install Playwright browsers
        working-directory: template-project
        run: npx playwright install --with-deps

      - name: Execute Playwright UI tests
        working-directory: template-project
        run: npm run test:ui
